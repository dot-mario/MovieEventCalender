name: Update Movie Coupon Events

on:
  schedule:
    # 2시간 단위로 크롤러 실행 (UTC 기준 0, 2, 4...)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # 수동 실행 트리거 제공
  push:
    # 코드를 커밋하고 푸시할 때마다 즉시 워크플로우 실행
    branches:
      - main

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      # 1. Playwright 브라우저 캐시 복원 또는 저장
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # requirements.txt 파일의 해시값을 키로 사용하여, 의존성이 바뀔 때만 캐시를 갱신합니다.
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/requirements.txt') }}
          
      # 2. 캐시가 없을 때(최초 1회 또는 패키지 변경 시)만 브라우저 다운로드
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium
        
      - name: Install Playwright OS Dependencies
        run: playwright install-deps chromium
      
      - name: Run Crawler
        run: |
          python backend/main.py
          
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/events.json
          
          # 변경사항이 있을 경우에만 커밋 및 푸시
          git diff --staged --quiet || (git commit -m "Auto Update: Movie Events JSON" && git push)
