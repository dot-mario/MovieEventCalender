name: Update Movie Coupon Events

on:
  schedule:
    # 2시간 단위로 크롤러 실행 (UTC 기준 0, 2, 4...)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # 수동 실행 트리거 제공
  push:
    # 코드를 커밋하고 푸시할 때마다 즉시 워크플로우 실행
    branches:
      - main

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      # 1. Playwright 브라우저 캐시 복원 또는 저장
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # requirements.txt 파일의 해시값을 키로 사용하여, 의존성이 바뀔 때만 캐시를 갱신합니다.
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/requirements.txt') }}
          
      # 2. 캐시가 없을 때(최초 1회 또는 패키지 변경 시)만 브라우저 다운로드
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium
        
      - name: Install Playwright OS Dependencies
        run: playwright install-deps chromium
      
      - name: Run Crawler
        run: |
          python backend/main.py
          
      - name: Set up Node.js
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend dependencies
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          cd frontend
          npm run build

      - name: Deploy Frontend (Full)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "Auto Update: Web App (Build)"

      - name: Deploy Data Only (Schedule)
        if: github.event_name == 'schedule'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/public/data
          destination_dir: data
          publish_branch: gh-pages
          keep_files: true
          commit_message: "Auto Update: Movie Events Data"
